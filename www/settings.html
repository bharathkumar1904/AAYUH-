<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Settings</title>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f3f3;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 {
      color: #007bff;
      margin-bottom: 5px;
    }
    p {
      font-size: 14px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .save { background: #007bff; }
    .update { background: #28a745; }
    .logout { background: #dc3545; }
    button i { margin-right: 8px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>⚙️ Settings</h2>
    <p>Email: <span id="userEmail"></span></p>

    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Your Name" />

    <label>Phone Number</label>
    <input type="text" id="phoneNumber" placeholder="Your Phone" />

    <button class="save" id="saveBtn"><i class="fa fa-save"></i> Save Changes</button>

    <label>Change Password</label>
    <input type="password" id="newPassword" placeholder="New Password" />
    <button class="update" id="updatePasswordBtn"><i class="fa fa-key"></i> Update Password</button>

    <button class="logout" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Logout</button>
  </div>

  <script type="module">
    // ====== FIREBASE CONFIGURATION ======
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      updatePassword, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDVZNBKutvRFrQOFQunVgSBwJFLMvrct0Q",
      authDomain: "aayuh-c9a87.firebaseapp.com",
      projectId: "aayuh-c9a87",
      storageBucket: "aayuh-c9a87.firebasestorage.app",
      messagingSenderId: "459370049467",
      appId: "1:459370049467:web:4354a11c6b43d3f6dede9e",
      measurementId: "G-GNFKCBES0L"
    };

    // ====== INITIALIZE FIREBASE ======
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ====== DOM ELEMENTS ======
    const fullNameInput = document.getElementById('fullName');
    const phoneNumberInput = document.getElementById('phoneNumber');
    const saveBtn = document.getElementById('saveBtn');
    const updatePasswordBtn = document.getElementById('updatePasswordBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    const newPasswordInput = document.getElementById('newPassword');

    // ====== CHECK LOGIN STATE ======
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        userEmail.textContent = user.email;

        // Load user settings from Firestore
        const docRef = doc(db, "userSettings", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          fullNameInput.value = data.fullName || "";
          phoneNumberInput.value = data.phoneNumber || "";
        }
      } else {
        // Redirect to index.html if not logged in
        window.location.href = "index.html";
      }
    });

    // ====== SAVE SETTINGS ======
    saveBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await setDoc(doc(db, "userSettings", user.uid), {
          fullName: fullNameInput.value,
          phoneNumber: phoneNumberInput.value,
          email: user.email
        }, { merge: true });

        alert('✅ Profile updated successfully!');
      }
    });

    // ====== UPDATE PASSWORD ======
    updatePasswordBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      const newPassword = newPasswordInput.value.trim();
      
      if (user && newPassword.length >= 6) {
        try {
          await updatePassword(user, newPassword);
          alert('🔐 Password updated successfully!');
          newPasswordInput.value = "";
        } catch (error) {
          alert('❌ ' + error.message);
        }
      } else {
        alert('⚠️ Password must be at least 6 characters long.');
      }
    });

    // ====== LOGOUT ======
    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>

     AAYUH Cookie Consent Banner

     the closing </body> tag on EVERY page of your site.

<style>
  #cookie-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 99999;
    background: #0f1f1d;
    color: #e0f7f4;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.25);
    font-family: 'Plus Jakarta Sans', 'DM Sans', Arial, sans-serif;
    font-size: 13.5px;
    line-height: 1.6;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #cookie-banner.show {
    transform: translateY(0);
  }

  .cookie-text {
    flex: 1;
    min-width: 220px;
    color: rgba(255,255,255,0.8);
  }

  .cookie-text strong {
    color: #5eead4;
    font-size: 14px;
  }

  .cookie-text a {
    color: #5eead4;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .cookie-actions {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    align-items: center;
  }

  .cookie-btn-accept {
    background: #0d9488;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
  }

  .cookie-btn-accept:hover {
    background: #0f766e;
    transform: translateY(-1px);
  }

  .cookie-btn-decline {
    background: transparent;
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s, border-color 0.2s;
  }

  .cookie-btn-decline:hover {
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.3);
  }

  @media (max-width: 560px) {
    #cookie-banner { padding: 14px 16px; }
    .cookie-actions { width: 100%; justify-content: flex-end; }
  }
</style>

<div id="cookie-banner" role="dialog" aria-label="Cookie consent">
  <div class="cookie-text">
    <strong>🍪 We use cookies</strong><br>
    We use cookies to improve your experience and display relevant advertisements.
    By clicking <em>Accept</em>, you agree to our use of cookies as described in our
    <a href="Privacy Policy.html">Privacy Policy</a>.
    Google AdSense may also use cookies to personalise ads —
    <a href="https://www.google.com/settings/ads" target="_blank" rel="noopener">manage ad preferences</a>.
  </div>
  <div class="cookie-actions">
    <button class="cookie-btn-decline" onclick="cookieDecline()">Decline</button>
    <button class="cookie-btn-accept" onclick="cookieAccept()">✓ Accept All</button>
  </div>
</div>

<script>
  (function() {
    // Show banner only if consent not already given
    var consent = localStorage.getItem('aayuh_cookie_consent');
    if (!consent) {
      setTimeout(function() {
        var banner = document.getElementById('cookie-banner');
        if (banner) banner.classList.add('show');
      }, 800);
    }
  })();

  function cookieAccept() {
    localStorage.setItem('aayuh_cookie_consent', 'accepted');
    hideBanner();
  }

  function cookieDecline() {
    localStorage.setItem('aayuh_cookie_consent', 'declined');
    hideBanner();
  }

  function hideBanner() {
    var banner = document.getElementById('cookie-banner');
    if (banner) {
      banner.style.transition = 'transform 0.3s ease';
      banner.style.transform = 'translateY(100%)';
      setTimeout(function() { banner.style.display = 'none'; }, 300);
    }
  }
</script>
<!-- ═══════════════════════════════════════════════════ -->
<script src='backbutton.js'></script>
</body>
</html>
