<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

    <script>
        (function(){
            emailjs.init("y2tDslGs-7i6B0Obc");
        })();

        function sendMail(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.classList.add("loading");
            btn.disabled = true;

            emailjs.send("service_nezcj0g", "template_k07hlj9", {
                from_name: document.getElementById("name").value,
                from_email: document.getElementById("email").value,
                phone_number: document.getElementById("phone").value,
                message: document.getElementById("message").value
            })
            .then(function() {
                btn.classList.remove("loading");
                btn.disabled = false;
                showToast("✅ Message sent successfully!", "success");
                document.getElementById("contactForm").reset();
                document.querySelectorAll(".input-wrap").forEach(w => w.classList.remove("has-value"));
            }, function(error) {
                btn.classList.remove("loading");
                btn.disabled = false;
                showToast("❌ Failed to send. Please try again.", "error");
            });
        }

        function showToast(msg, type) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = "toast show " + type;
            setTimeout(() => toast.className = "toast", 3000);
        }

        function checkValue(el) {
            el.closest(".input-wrap").classList.toggle("has-value", el.value.length > 0);
        }

        window.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll("input, textarea").forEach(el => {
                el.addEventListener("input", () => checkValue(el));
            });
        });
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:     #0f0e17;
            --paper:   #fffcf5;
            --accent:  #e8572a;
            --accent2: #f5a623;
            --muted:   #7a7668;
            --border:  #e2ddd4;
            --card:    #ffffff;
            --radius:  14px;
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --shadow: 0 4px 24px rgba(15,14,23,.08), 0 1px 4px rgba(15,14,23,.04);
            --shadow-hover: 0 8px 40px rgba(15,14,23,.14), 0 2px 8px rgba(15,14,23,.06);
        }

        body {
            font-family: var(--font-body);
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ── Background texture ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 70% 50% at 10% 0%, rgba(232,87,42,.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(245,166,35,.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Page wrapper ── */
        .page-wrap {
            width: 100%;
            max-width: 980px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Inner row: sidebar + card side by side on desktop */
        .content-row {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: stretch;
        }

        @media (min-width: 768px) {
            .content-row {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        /* ── Ad slots ── */
        .ad-slot {
            border-radius: var(--radius);
            border: 1.5px dashed var(--border);
            background: linear-gradient(135deg, #faf9f6 0%, #f3f0ea 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--muted);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .06em;
            text-transform: uppercase;
            transition: border-color .2s;
            overflow: hidden;
        }
        .ad-slot:hover { border-color: var(--accent2); }

        @keyframes pulse {
            0%, 100% { opacity: .4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Side banner */
        .ad-side {
            width: 100%;
            min-height: 100px;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .ad-side {
                width: 240px;
                min-height: 300px;
                position: sticky;
                top: 24px;
            }
        }

        /* Bottom banner — full width, centered */
        .ad-bottom {
            width: 100%;
            max-width: 980px;
            min-height: 90px;
            text-align: center;
        }
        .ad-bottom > * {
            display: block;
            margin: 0 auto;
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            padding: 36px 32px 32px;
            width: 100%;
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .card-header { margin-bottom: 28px; }

        .eyebrow {
            font-family: var(--font-body);
            font-size: 11px; font-weight: 500;
            letter-spacing: .12em; text-transform: uppercase;
            color: var(--accent);
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px;
        }
        .eyebrow::before {
            content: '';
            display: block; width: 20px; height: 2px;
            background: var(--accent); border-radius: 2px;
        }

        .card-header h1 {
            font-family: var(--font-head);
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 800;
            line-height: 1.15;
            color: var(--ink);
        }

        .card-header h1 span {
            color: var(--accent);
            position: relative;
        }
        .card-header h1 span::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 100%; height: 3px;
            background: var(--accent);
            border-radius: 2px;
            transform: scaleX(0);
            transform-origin: left;
            animation: underline .5s .4s ease forwards;
        }
        @keyframes underline {
            to { transform: scaleX(1); }
        }

        .card-header p {
            margin-top: 8px;
            font-size: 14px; color: var(--muted); line-height: 1.6;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-grid .span-2 { grid-column: 1 / -1; }
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .span-2 { grid-column: 1; }
        }

        .input-wrap {
            position: relative;
            display: flex; flex-direction: column; gap: 4px;
        }

        .input-wrap label {
            font-size: 11px; font-weight: 500;
            letter-spacing: .07em; text-transform: uppercase;
            color: var(--muted);
            transition: color .2s;
        }

        .input-wrap:focus-within label { color: var(--accent); }

        .input-wrap input,
        .input-wrap textarea {
            font-family: var(--font-body);
            font-size: 14px; font-weight: 400;
            color: var(--ink);
            background: var(--paper);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            width: 100%;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            resize: none;
            -webkit-appearance: none;
        }

        .input-wrap input:focus,
        .input-wrap textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,87,42,.1);
            background: #fff;
        }

        .input-wrap textarea { min-height: 110px; }

        /* icon decorators */
        .input-icon {
            position: absolute;
            right: 12px; top: 32px;
            color: var(--border);
            font-size: 14px;
            pointer-events: none;
            transition: color .2s;
        }
        .input-wrap:focus-within .input-icon { color: var(--accent); }
        .input-wrap input,
        .input-wrap textarea { padding-right: 36px; }

        /* ── Submit button ── */
        .btn-submit {
            margin-top: 4px;
            width: 100%;
            padding: 14px 24px;
            font-family: var(--font-head);
            font-size: 15px; font-weight: 700;
            letter-spacing: .03em;
            color: #fff;
            background: var(--accent);
            border: none; border-radius: 10px;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform .15s, box-shadow .2s, background .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            background: #d44420;
            box-shadow: 0 6px 20px rgba(232,87,42,.35);
            transform: translateY(-1px);
        }

        .btn-submit:active:not(:disabled) { transform: translateY(0); }

        .btn-submit .btn-text { transition: opacity .15s; }
        .btn-submit .btn-spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-submit.loading .btn-text { opacity: 0; position: absolute; }
        .btn-submit.loading .btn-spinner { display: block; }
        .btn-submit:disabled { cursor: not-allowed; }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0 0;
            font-size: 12px; color: var(--muted);
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }

        /* ── Info strip ── */
        .info-strip {
            display: flex; flex-wrap: wrap; gap: 12px;
            margin-top: 20px;
        }
        .info-pill {
            display: flex; align-items: center; gap: 7px;
            font-size: 12px; color: var(--muted);
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 30px; padding: 5px 12px;
        }
        .info-pill svg { flex-shrink: 0; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            padding: 12px 22px; border-radius: 30px;
            font-family: var(--font-body); font-size: 14px; font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,.15);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
            opacity: 0; z-index: 9999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #1a7a4a; color: #fff; }
        .toast.error   { background: #c0392b; color: #fff; }
    </style>
</head>
<body>

    <!-- ══ Main Layout ══ -->
    <div class="page-wrap">
        <div class="content-row">

            <!-- Side Ad (desktop) / Small Banner (mobile) -->
            <div class="ad-slot ad-side">
                <script async="async" data-cfasync="false" src="https://pl29549502.effectivecpmnetwork.com/524b0aded63375ff999c0d77762a1bce/invoke.js"></script>
                <div id="container-524b0aded63375ff999c0d77762a1bce"></div>
            </div>

            <!-- Contact Card -->
            <div class="card">
            <div class="card-header">
                <div class="eyebrow">Get in touch</div>
                <h1>Send us a <span>Message</span></h1>
                <p>We typically respond within 24 hours. Fill out the form and we'll get back to you.</p>
            </div>

            <form id="contactForm" onsubmit="sendMail(event)">
                <div class="form-grid">

                    <div class="input-wrap">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Jane Doe" required autocomplete="name">
                        <span class="input-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                    </div>

                    <div class="input-wrap">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="jane@example.com" required autocomplete="email">
                        <span class="input-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </span>
                    </div>

                    <div class="input-wrap span-2">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="9876543210" pattern="[0-9]{10}" required autocomplete="tel">
                        <span class="input-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 10.5 19.79 19.79 0 0 1 1.62 2 2 2 0 0 1 3.62 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 8 8l.8-.8a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        </span>
                    </div>

                    <div class="input-wrap span-2">
                        <label for="message">Your Message</label>
                        <textarea id="message" placeholder="Describe your issue or question…" required></textarea>
                    </div>

                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="btn-text">Send Message &nbsp;→</span>
                    <span class="btn-spinner"></span>
                </button>

                <div class="divider">or reach us via</div>

                <div class="info-strip">
                    <div class="info-pill">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        bharath.ltd@gmail.com
                    </div>
                    <div class="info-pill">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 10.5 19.79 19.79 0 0 1 1.62 2 2 2 0 0 1 3.62 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 8 8l.8-.8a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        +91 98765 43210
                    </div>
                    <div class="info-pill">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        Mon–Sat, 9 AM–6 PM IST
                    </div>
                </div>
            </form>
        </div><!-- /.card -->
        </div><!-- /.content-row -->
    </div><!-- /.page-wrap -->

    <!-- ══ Bottom Banner Ad — full width centred ══ -->
    <div class="ad-slot ad-bottom">
        <script async="async" data-cfasync="false" src="https://pl29563401.effectivecpmnetwork.com/4d0ddff6ce49a14b046efc4686a17d4c/invoke.js"></script>
        <div id="container-4d0ddff6ce49a14b046efc4686a17d4c"></div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="backbutton.js"></script>
</body>
</html>
