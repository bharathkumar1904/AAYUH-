<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aayuh – Medicine Info</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    .search-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin-bottom: 30px;
      animation: slideUp 0.6s ease;
    }

    .info-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box {
      position: relative;
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 18px 60px 18px 20px;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      border-radius: 50px;
      transition: all 0.3s;
      background: #f8f9fa;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .search-box button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .search-box button:hover {
      transform: translateY(-50%) scale(1.05);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .search-box button:active {
      transform: translateY(-50%) scale(0.98);
    }

    .source-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .source-btn {
      flex: 1;
      min-width: 150px;
      padding: 12px 20px;
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .source-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
    }

    .source-btn:hover {
      border-color: #667eea;
    }

    #result {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease;
    }

    #result.hidden {
      display: none;
    }

    .medicine-header {
      border-bottom: 3px solid #667eea;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .medicine-header h2 {
      color: #667eea;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .source-tag {
      display: inline-block;
      padding: 6px 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .info-section {
      margin-bottom: 25px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .info-section h3 {
      color: #667eea;
      font-size: 1.2rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info-section p {
      color: #333;
      line-height: 1.8;
      font-size: 1rem;
    }

    .simple-explanation {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-left: 4px solid #2196f3;
      padding: 20px;
      border-radius: 12px;
      margin-top: 25px;
    }

    .simple-explanation h3 {
      color: #1976d2;
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    .disclaimer {
      background: linear-gradient(135deg, #fff3cd 0%, #ffe082 100%);
      border-left: 4px solid #ffc107;
      padding: 20px;
      border-radius: 12px;
      margin-top: 30px;
      font-size: 0.95rem;
      color: #856404;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 1.1rem;
    }

    .loading i {
      font-size: 2.5rem;
      margin-bottom: 15px;
      animation: spin 1s linear infinite;
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #d32f2f;
    }

    .error i {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .error h3 {
      margin-bottom: 15px;
    }

    .suggestions {
      text-align: left;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .suggestions h4 {
      color: #667eea;
      margin-bottom: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .header h1 {
        font-size: 2rem;
      }

      .header p {
        font-size: 1rem;
      }

      .search-card {
        padding: 20px;
      }

      #result {
        padding: 20px;
      }

      .medicine-header h2 {
        font-size: 1.5rem;
      }

      .search-box input {
        font-size: 1rem;
        padding: 15px 55px 15px 18px;
      }

      .search-box button {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

      .source-btn {
        min-width: 120px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-pills"></i> Aayuh</h1>
      <p>Your trusted medicine information assistant</p>
    </div>

    <div class="search-card">
      <div class="info-badge">
        <i class="fas fa-lightbulb"></i>
        <span>Use generic names (Paracetamol, Ibuprofen) for better results</span>
      </div>

      <div class="source-selector">
        <button class="source-btn active" data-source="openfda" onclick="selectSource('openfda')">
          <i class="fas fa-database"></i> OpenFDA
        </button>
        <button class="source-btn" data-source="rxnorm" onclick="selectSource('rxnorm')">
          <i class="fas fa-flask"></i> RxNorm (NLM)
        </button>
        <button class="source-btn" data-source="both" onclick="selectSource('both')">
          <i class="fas fa-layer-group"></i> Combined
        </button>
      </div>

      <div class="search-box">
        <input 
          type="text" 
          id="medicineInput" 
          placeholder="Search medicine..." 
          onkeypress="if(event.key === 'Enter') searchMedicine()"
        >
        <button onclick="searchMedicine()">
          <i class="fas fa-search"></i> Search
        </button>
      </div>
    </div>

    <div id="result" class="hidden"></div>
  </div>

  <script>
    let currentSource = 'openfda';

    const indianBrandMap = {
      "dolo 650": "paracetamol",
      "dolo": "paracetamol",
      "crocin": "paracetamol",
      "calpol": "paracetamol",
      "sumo": "paracetamol",
      "azithral": "azithromycin",
      "allegra": "fexofenadine",
      "cetzine": "cetirizine",
      "okacet": "cetirizine",
      "zyrtec": "cetirizine",
      "montek lc": "montelukast",
      "singulair": "montelukast",
      "pan 40": "pantoprazole",
      "omez": "omeprazole",
      "disprin": "aspirin",
      "brufen": "ibuprofen",
      "combiflam": "ibuprofen",
      "advil": "ibuprofen",
      "tylenol": "acetaminophen",
      "augmentin": "amoxicillin"
    };

    function selectSource(source) {
      currentSource = source;
      document.querySelectorAll('.source-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-source="${source}"]`).classList.add('active');
    }

    function simplify(text, maxSentences = 3) {
      if (!text) return "Information not available.";
      const sentences = text.replace(/\n/g, " ").split(/\.\s+/);
      return sentences.slice(0, maxSentences).join(". ") + ".";
    }

    function getSimpleUsage(name) {
      name = name.toLowerCase();

      if (name.includes("paracetamol") || name.includes("acetaminophen")) {
        return {
          timing: "After meals, every 4-6 hours as needed",
          explanation: "Reduces fever and relieves mild to moderate pain. Maximum 4 grams (4000mg) per day for adults.",
          precautions: "Avoid alcohol. Do not exceed recommended dose as it can cause liver damage."
        };
      }

      if (name.includes("ibuprofen")) {
        return {
          timing: "After meals with water",
          explanation: "Reduces pain, fever, and inflammation. Effective for headaches, muscle pain, and arthritis.",
          precautions: "Take with food to prevent stomach upset. Avoid if you have stomach ulcers."
        };
      }

      if (name.includes("cetirizine") || name.includes("fexofenadine")) {
        return {
          timing: "Once daily, preferably at night",
          explanation: "Treats allergy symptoms like sneezing, itching, runny nose, and watery eyes.",
          precautions: "May cause drowsiness. Avoid driving after taking cetirizine."
        };
      }

      if (name.includes("azithromycin") || name.includes("amoxicillin")) {
        return {
          timing: "At the same time each day",
          explanation: "Antibiotic that fights bacterial infections. Must complete the full course.",
          precautions: "Complete the entire prescription even if you feel better. Do not skip doses."
        };
      }

      if (name.includes("omeprazole") || name.includes("pantoprazole")) {
        return {
          timing: "30 minutes before breakfast",
          explanation: "Reduces stomach acid production. Treats heartburn, acid reflux, and ulcers.",
          precautions: "Take on empty stomach for best results. Not for immediate heartburn relief."
        };
      }

      return {
        timing: "As prescribed by your doctor",
        explanation: "Use only under medical supervision.",
        precautions: "Follow your doctor's instructions carefully."
      };
    }

    async function searchFromOpenFDA(searchName) {
      const response = await fetch(
        `https://api.fda.gov/drug/label.json?search=${encodeURIComponent(searchName)}&limit=1`
      );
      
      if (!response.ok) throw new Error('Not found');
      
      const data = await response.json();
      return data.results[0];
    }

    async function searchFromRxNorm(searchName) {
      // RxNorm API for cross-validation
      const response = await fetch(
        `https://rxnav.nlm.nih.gov/REST/drugs.json?name=${encodeURIComponent(searchName)}`
      );
      
      if (!response.ok) throw new Error('Not found');
      
      const data = await response.json();
      return data;
    }

    async function searchMedicine() {
      const input = document.getElementById("medicineInput").value.trim();
      const result = document.getElementById("result");

      if (!input) {
        result.className = 'error';
        result.classList.remove('hidden');
        result.innerHTML = `
          <i class="fas fa-exclamation-circle"></i>
          <h3>Please enter a medicine name</h3>
        `;
        return;
      }

      let searchName = input.toLowerCase();
      if (indianBrandMap[searchName]) {
        searchName = indianBrandMap[searchName];
      }

      result.classList.remove('hidden');
      result.className = 'loading';
      result.innerHTML = `
        <i class="fas fa-spinner"></i>
        <p>Searching medicine information...</p>
      `;

      try {
        if (currentSource === 'openfda' || currentSource === 'both') {
          const med = await searchFromOpenFDA(searchName);
          displayResults(med, searchName, 'OpenFDA');
        } else if (currentSource === 'rxnorm') {
          const rxData = await searchFromRxNorm(searchName);
          displayRxNormResults(rxData, searchName);
        }
      } catch (error) {
        result.className = 'error';
        result.innerHTML = `
          <i class="fas fa-times-circle"></i>
          <h3>Medicine not found</h3>
          <p>We couldn't find information about "${input}"</p>
          
          <div class="suggestions">
            <h4><i class="fas fa-lightbulb"></i> Suggestions:</h4>
            <p>• Check spelling and try again</p>
            <p>• Use generic name instead of brand name</p>
            <p>• Examples: Dolo 650 → Paracetamol, Crocin → Paracetamol</p>
            <p>• Try switching data sources above</p>
          </div>
        `;
      }
    }

    function displayResults(med, searchName, source) {
      const result = document.getElementById("result");
      const medicineName = med.openfda?.generic_name?.[0] || med.openfda?.brand_name?.[0] || searchName;
      
      const use = simplify(med.indications_and_usage?.[0]);
      const dosage = simplify(med.dosage_and_administration?.[0]);
      const sideEffects = simplify(med.adverse_reactions?.[0]);
      const warnings = simplify(med.warnings?.[0]);
      const simple = getSimpleUsage(searchName);

      result.className = '';
      result.innerHTML = `
        <div class="medicine-header">
          <h2><i class="fas fa-capsules"></i> ${medicineName}</h2>
          <span class="source-tag"><i class="fas fa-database"></i> Source: ${source}</span>
        </div>

        <div class="info-section">
          <h3><i class="fas fa-check-circle"></i> Medical Uses</h3>
          <p>${use}</p>
        </div>

        <div class="info-section">
          <h3><i class="fas fa-prescription-bottle"></i> Dosage & Administration</h3>
          <p>${dosage}</p>
        </div>

        <div class="info-section">
          <h3><i class="fas fa-clock"></i> When to Take</h3>
          <p>${simple.timing}</p>
        </div>

        <div class="info-section">
          <h3><i class="fas fa-exclamation-triangle"></i> Side Effects</h3>
          <p>${sideEffects}</p>
        </div>

        ${warnings !== "Information not available." ? `
        <div class="info-section">
          <h3><i class="fas fa-shield-alt"></i> Warnings</h3>
          <p>${warnings}</p>
        </div>
        ` : ''}

        <div class="simple-explanation">
          <h3><i class="fas fa-info-circle"></i> Simple Explanation</h3>
          <p><strong>What it does:</strong> ${simple.explanation}</p>
          <p><strong>Important:</strong> ${simple.precautions}</p>
        </div>

        <div class="disclaimer">
          <i class="fas fa-exclamation-triangle"></i>
          <strong>Medical Disclaimer:</strong> This information is for educational purposes only and comes from public databases. 
          Always consult with a qualified healthcare professional before taking any medication. 
          Do not use this as a substitute for professional medical advice.
        </div>
      `;
    }

    function displayRxNormResults(data, searchName) {
      const result = document.getElementById("result");
      
      if (!data.drugGroup?.conceptGroup) {
        throw new Error('No results');
      }

      const simple = getSimpleUsage(searchName);
      
      result.className = '';
      result.innerHTML = `
        <div class="medicine-header">
          <h2><i class="fas fa-capsules"></i> ${searchName}</h2>
          <span class="source-tag"><i class="fas fa-flask"></i> Source: RxNorm (NLM)</span>
        </div>

        <div class="simple-explanation">
          <h3><i class="fas fa-info-circle"></i> Information</h3>
          <p><strong>When to take:</strong> ${simple.timing}</p>
          <p><strong>What it does:</strong> ${simple.explanation}</p>
          <p><strong>Important:</strong> ${simple.precautions}</p>
        </div>

        <div class="disclaimer">
          <i class="fas fa-exclamation-triangle"></i>
          <strong>Medical Disclaimer:</strong> Limited information available from this source. 
          For detailed information, try the OpenFDA or Combined source options above. 
          Always consult with a qualified healthcare professional.
        </div>
      `;
    }

    window.onload = function() {
      document.getElementById('medicineInput').focus();
    };
  </script>
</body>
</html>
